; Shared defaults inherited by every [env:*] below.
; ----------------------------------------------------------------
; upload_port is the ONLY thing that changes when you re-plug the
; USB cable. Edit it here once and every env picks it up.
; (Auto-detect won't work for the ATtiny ISP setup because the
;  port belongs to the programmer, not the target chip.)
; ----------------------------------------------------------------
[env]
platform = atmelavr
framework = arduino
upload_port = COM3
upload_speed = 19200
upload_protocol = stk500v1
upload_flags =
	-P$UPLOAD_PORT
	-b$UPLOAD_SPEED

[env:attiny84]
board = attiny84

[env:attiny85]
board = attiny85

; Nano uploads over its USB bootloader, not via ISP,
; so it overrides protocol, flags and speed. Port is inherited.
[env:nanoatmega328]
board = nanoatmega328
upload_protocol = arduino
upload_flags =
upload_speed = 57600
monitor_speed = 9600
